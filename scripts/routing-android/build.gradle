buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.2.2'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.23"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
    buildDir = '../../build/routing-android-aar'
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
    namespace "com.akylas.routing"
    compileSdkVersion 35

    defaultConfig {
        minSdkVersion 21
        targetSdkVersion 35
        versionCode 1
        versionName System.getProperty('build-version', '1.0.0')

        externalNativeBuild {
            cmake {
                cppFlags "-std=c++17"
                arguments "-DANDROID_STL=c++_static",
                          "-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON",
                          "-DROUTING_WITH_VALHALLA:BOOL=ON",
                          "-DSDK_VERSION=${System.getProperty('build-version', '1.0.0')}"
            }
        }

        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a', 'x86_64'
        }
    }

    externalNativeBuild {
        cmake {
            path "../../routing-lib/android/src/main/cpp/CMakeLists.txt"
            version "3.18.1"
        }
    }

    sourceSets {
        main {
            kotlin.srcDirs = ['../../routing-lib/android/src/main/kotlin']
            manifest.srcFile '../../routing-lib/android/src/main/AndroidManifest.xml'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    packagingOptions {
        doNotStrip "*/*/libvalhalla_routing.so"
    }

    lintOptions {
        checkReleaseBuilds false
        abortOnError false
    }
}

group = 'com.akylas.routing'
version = System.getProperty('build-version', '1.0.0')
